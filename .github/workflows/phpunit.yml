name: "PHPUnit tests"

on:
  pull_request:
  push:

jobs:
  phpunit:
    name: "PHPUnit tests"

    runs-on: ${{ matrix.operating-system }}

    env:
      PHAKE_CACHEDIR: "/tmp"    

    strategy:
      matrix:
        php-version:
          - "7.1"
          - "7.2"        
          - "7.3"                  
          - "7.4"
          - "8.0"
        operating-system:
          - "ubuntu-latest"
        include:
          - php-version: "8.0"
            operating-system: "ubuntu-latest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v2"

      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          php-version: "${{ matrix.php-version }}"
          tools: composer:v2

      - name: "Install dependencies"
        run: "composer install --no-interaction --no-progress --no-suggest"

      - name: "Tests"
        run: "bin/phpunit"
